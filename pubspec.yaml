name: study_master
description: 三浦塾 学習管理システム - 成績・授業・進捗管理アプリ
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: 6.1.5+1
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0
  intl: 0.19.0
  fl_chart: 0.69.0
  table_calendar: 3.1.3
  percent_indicator: 4.2.3
  confetti: 0.8.0
  animated_text_kit: 4.2.3
  lottie: 3.3.1
  image_picker: 1.1.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: 2.0.1
  build_runner: 2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
